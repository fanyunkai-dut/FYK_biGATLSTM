QX_otherdata_preprocessing: #处理降雨以外的气象数据，如温度、风速、气压、相对湿度、长波辐射、短波辐射等，因为降雨需要子流域内所有网格加和、这些只需平均值
       start_time : "2020-11-09 00:00:00"      # 起始日期（包含当天0点）
       end_time : "2025-09-30 20:00:00"    # 结束日期（包含当天20点）
       nc_path : '/home/fanyunkai/FYK_GCNLSTM/a_original_dataset_processed/QX_original_dataset/changjiang_lwd'   # NC文件所在文件夹
       lon_lat_path : '/home/fanyunkai/FYK_GCNLSTM/xiangjiang5_sub_gat/Subwatershed/xiangjiang干支流.xlsx'                     # 站点Excel文件
       output : '/home/fanyunkai/FYK_GCNLSTM/xiangjiang5_sub_gat/QX/xiangjiang_processed_lwd_data.npy'  # 输出文件
       variable_name : 'downward_longwave_radiation' # NC文件中对应的变量名称，如温度可能是 'air_temperature'，风速可能是 'wind_speed'，气压可能是 'surface_pressure'，相对湿度可能是 'relative_humidity'，长波辐射可能是 'downward_longwave_radiation'，短波辐射可能是 'downward_shortwave_radiation'，根据实际情况修改

