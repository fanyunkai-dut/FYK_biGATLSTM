    - '水温'
    - 'pH'
    - '溶解氧'

  # 预处理后生成的时间类别编号。不要标准化，不要当连续特征。
  time_feature_names:
    - 'year_id'
    - 'month_id'
    - 'day_id'
    - 'hour_id'

  USE_CALENDAR_TIME_EMBEDDING: true
  YEAR_EMB_DIM: 4
  MONTH_EMB_DIM: 4
  DAY_EMB_DIM: 4
  HOUR_EMB_DIM: 4
  # NUM_YEARS 可以不写，代码会按 year_id 自动推断。
  # NUM_YEARS: 4

  # 动态气象/外部条件特征：进入气象分支。
  meteorological_feature_names:
    - 'P4'
    - 'P12'
    - 'P24'
    - 'P72'
    - 'Imax24'
    - 'API72'
    - 'T_now'
    - 'T24_mean'
    - 'SWD24_mean'
    - 'Wind24_mean'

  # 静态站点属性：仍作为水质分支和气象分支的站点背景条件。
  static_feature_names:
    - '平均dem'
    - '坡度'
    - '面积'
    - '上游面积总和'
    - '河流等级'
    - '主河道长度'
    - '是否干流'
    - '耕地'
    - '林地'
    - '城镇'
    - '农村'

  # 水质主分支上下文融合
  USE_STATION_ID_EMBEDDING: true
  CONTEXT_ALPHA_INIT: 0.1
  OBS_RECON_LOSS_WEIGHT: 0.0

  # 气象条件分支
  USE_MET_BRANCH: true
  MET_N_HEAD: 4
  MET_N_LAYERS: 1
  MET_D_FF: 256
  MET_DROPOUT: 0.1
  MET_CROSS_HEADS: 4
  MET_ALPHA_INIT: 0.1
  MET_CONTEXT_ALPHA_INIT: 0.1
  MET_USE_TIME_CONTEXT: true
  MET_USE_STATIC_CONTEXT: true
  MET_USE_STATION_CONTEXT: true

  # 邻站空间分支：第一版不使用 GAT，只使用邻接矩阵作为 attention mask。
  USE_SPATIAL_BRANCH: true
  # upstream: 只用上游；downstream: 只用下游；both: 上下游分离后同时使用。
  SPATIAL_DIRECTION_MODE: both
  SPATIAL_N_HEAD: 4
  SPATIAL_N_LAYERS: 1
  SPATIAL_D_FF: 256
  SPATIAL_DROPOUT: 0.1
  SPATIAL_CROSS_HEADS: 4
  SPATIAL_ALPHA_INIT: 0.1
  SPATIAL_CONTEXT_ALPHA_INIT: 0.1
  SPATIAL_USE_TIME_CONTEXT: true
  SPATIAL_USE_STATIC_CONTEXT: true
  SPATIAL_USE_STATION_CONTEXT: true
  SPATIAL_EXCLUDE_SELF: true
  SPATIAL_FALLBACK_TO_ALL: false
  # 如果你的邻接矩阵行列方向是 source->target，而代码需要 target->neighbor，可改成 true 试一版。

  block_masking:
    # all_targets：同一个连续块里 5 个水质变量一起遮住，更接近多参数探头停机。
    # random_variable：每次只遮住 1 个随机水质变量。
    # random_subset：每次随机遮住若干个水质变量。
    mask_mode: all_targets

    train_block_lengths: [3, 6, 12, 18, 42, 180]
    train_num_blocks_per_sample: 1
    train_block_seed: 42

    val_block_lengths: [3, 6, 12, 18, 42, 180]
    val_num_blocks_per_sample: 1
    val_block_seed: 202

    test_block_lengths: [3, 6, 12, 18, 42, 180]
    test_num_blocks_per_sample: 1
    test_block_seed: 303

    min_window_observed_ratio: 0.80

    # 180 小时缺失需要左右都有足够上下文；SEQ_LEN=384 时比较合理。
    min_context_by_length:
      3: 12
      6: 12
      9: 24
      12: 24
      18: 24
      42: 48
      180: 72

    allow_fallback_shorter: true

  # 训练完成后专门按这些连续缺失长度在测试集评估。
  TEST_EVAL_BLOCK_LENGTHS: [3, 6, 9, 12, 18, 42, 180]
  TEST_EVAL_BLOCK_SEED: 5051
  MAX_SCATTER_POINTS_PER_TARGET: 20000
  EVAL_IN_ORIGINAL_SCALE: false